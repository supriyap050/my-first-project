<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" autocomplete="on" novalidate>
        <label for="student name">Student Name:</label>
        <input type="text" id="student name"/>
    <br/>
        <label for="roll no.">  Roll.no.:  </label>
         <input type="number" id="roll no.:" min="10" max="20">
    <br/>
     <label for="father's name">Father's name:</label>
     <input type="father's name" id="father's name">
    <br/>
    <label for="date of birth:">Date of birth:</label>
    <input type="date" id="date of birth">
    <br/>
    <label for="mobile no">Mobile no.:</label>
    <input type="mobile no." id="mobile no."minlength="1" maxlength="10">
    <br/>
        <lable for="email">Email :</lable>
        <input type="email" id="email" required/>
    <br/>
     Age: <input type="number" min="10" max="50">
    <label for="password">Password</label>
    <input type="password" id="password" minlength="10" maxlength="11"/>
    <br/>
Gender :
    Male <input type="radio" name="gender" value="male">
    Female <input type="radio" name="gender" value="female">
   <br/>
   <label for="department">Department :</label>
   CSE <input type="checkbox" checked>
   IT <input type="checkbox" checked>
   ECE <input type="checkbox" checked>
   CIVIL <input type="checkbox" checked>
    <br/>
    TIME : <input type="time"> 
    <br>
    <label for="Course">Course :</label>
  <select>
        <option disabled selected>Select Current Course</option>
        <option>B.tech</option>
        <option>MBA</option>
        <option>BCA</option>
    </select>
    <br/>
    <input type="file" accept="image/*">
    <br>
    Range:  <input type="range">
    <br/>
         <button>Register</button>
         <input type="reset">
    <input type="search" placeholder="search here......" >


    </form>
</body>
</html>
